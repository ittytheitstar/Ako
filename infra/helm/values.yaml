global:
  imageRegistry: ""
  imagePullSecrets: []

api:
  replicaCount: 2
  image:
    repository: ako/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    PORT: "8080"

realtime:
  replicaCount: 2
  image:
    repository: ako/realtime
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

web:
  replicaCount: 2
  image:
    repository: ako/web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  hosts:
    app: app.ako.example.com
    api: api.ako.example.com
    realtime: rt.ako.example.com

postgresql:
  enabled: true
  auth:
    username: ako
    password: ako
    database: ako

redis:
  enabled: true
  auth:
    enabled: false

nats:
  enabled: true
  nats:
    jetstream:
      enabled: true

secrets:
  jwtSecret: "CHANGE_ME_32_CHAR_SECRET"
  databaseUrl: ""
