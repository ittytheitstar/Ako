apiVersion: apps/v1
kind: Deployment
metadata:
  name: ako-realtime
  namespace: ako
  labels:
    app: ako-realtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ako-realtime
  template:
    metadata:
      labels:
        app: ako-realtime
    spec:
      containers:
        - name: realtime
          image: ako/realtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
          envFrom:
            - configMapRef:
                name: ako-config
            - secretRef:
                name: ako-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ako-realtime
  namespace: ako
spec:
  selector:
    app: ako-realtime
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
