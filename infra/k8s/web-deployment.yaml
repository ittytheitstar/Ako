apiVersion: apps/v1
kind: Deployment
metadata:
  name: ako-web
  namespace: ako
  labels:
    app: ako-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ako-web
  template:
    metadata:
      labels:
        app: ako-web
    spec:
      containers:
        - name: web
          image: ako/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_BASE
              value: "https://api.ako.example.com/api/v1"
            - name: NEXT_PUBLIC_RT_BASE
              value: "wss://rt.ako.example.com"
            - name: API_BASE_INTERNAL
              value: "http://ako-api:8080/api/v1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ako-web
  namespace: ako
spec:
  selector:
    app: ako-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
