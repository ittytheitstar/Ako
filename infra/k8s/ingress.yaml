apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ako-ingress
  namespace: ako
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: app.ako.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ako-web
                port:
                  number: 3000
    - host: api.ako.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ako-api
                port:
                  number: 8080
    - host: rt.ako.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ako-realtime
                port:
                  number: 8090
